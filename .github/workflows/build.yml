name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build JAR (includes UI)
        run: ./gradlew bootJar

      - name: Verify UI is packaged
        run: |
          jar tf build/libs/*.jar | grep 'static/index.html' && echo "UI packaged OK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otel-collector
          path: build/libs/*.jar
